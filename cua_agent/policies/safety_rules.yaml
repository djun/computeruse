# Shared safety rules for the CUA core (applies across adapters).
blocked_actions:
  - sandbox_shell
  - shell_command  # legacy alias (kept for compatibility)

blocked_bundle_ids:
  - com.apple.keychainaccess

hitl_actions:
  - erase_disk
  - format_disk
  - run_javascript  # Requires user approval for arbitrary code

sensitive_domains:
  - "chase.com"
  - "aws.amazon.com"
  - "console.cloud.google.com"

allowed_shell_basenames:
  - ls
  - cat
  - pwd
  - mkdir
  - rm
  - cp
  - mv
  - python
  - node

blocked_shell_basenames:
  - sudo
  - ssh
  - scp
  - curl
  - wget
  - chmod
  - chown
  - nc
  - telnet
  - ftp

allowed_script_extensions:
  - .py
  - .sh
  - .js
  - .ps1
  - .bat
  - .cmd

script_hitl_patterns:
  - import socket
  - from socket import
  - import subprocess
  - from subprocess import
  - import os
  - from os import
  - eval(
  - exec(
  - __import__(
  - powershell -
  - invoke-webrequest
  - invoke-restmethod

notes: |
  Extend this file to reflect local risk appetite and app allow/deny lists.
